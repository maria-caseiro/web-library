{% extends "base.html" %}
{% block content %}

<main>
    <div class="page-header">
        <h2>Edit Reader</h2>
    </div>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <p class="form-error">{{ messages[0] }}</p>
    {% endif %}
    {% endwith %}
    <form action="/readers/{{ reader.reader_id }}/edit" method="POST">
        <div class="form-fields">
            <input type="text" name="name" value="{{ reader.name }}" required>
            <input type="email" name="email" value="{{ reader.email }}">
            <input type="text" name="phone" value="{{ reader.phone }}">
            <input type="text" name="address" value="{{ reader.address }}">
            <input type="text" name="location" value="{{ reader.location }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save</button>
            <a href="/readers/{{ reader.reader_id }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</main>

{% endblock %}
