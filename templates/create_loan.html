<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Loan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/mini-logo.png') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top" style="border-bottom: 1px solid #dce8f5;">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">Web Library</a>
            <div class="navbar-nav me-auto flex-row gap-3">
                <a class="nav-link" href="/books">Books</a>
                <a class="nav-link" href="/readers">Readers</a>
                <a class="nav-link" href="/loans">Loans</a>
            </div>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h2>New Loan</h2>
        </div>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <p class="form-error">{{ messages[0] }}</p>
        {% endif %}
        {% endwith %}
        <form method="POST" action="/loans/create">
            <div class="form-fields">
                <input list="readers-list" name="reader_id" placeholder="Search reader...">
                <datalist id="readers-list">
                    {% for reader in readers %}
                    <option value="{{ reader['reader_id'] }}">{{ reader['name'] }} — {{ reader['email'] }}</option>
                    {% endfor %}
                </datalist>

                <input list="books-list" name="book_id" placeholder="Search book...">
                <datalist id="books-list">
                    {% for book in books %}
                    <option value="{{ book['book_id'] }}">{{ book['title'] }} - {{ book['author'] }}</option>
                    {% endfor %}
                </datalist>
            </div>
            <div class="form-actions">
                <button class="btn-primary">Create Loan</button>
                <a href="/loans" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </main>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
