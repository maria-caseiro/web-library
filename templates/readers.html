<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Web Library</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/mini-logo.png') }}">
</head>

<body>
	<nav class="navbar navbar-expand-lg sticky-top" style="border-bottom: 1px solid #dce8f5;">
		<div class="container-fluid px-4">
			<a class="navbar-brand" href="/">Web Library</a>
			<div class="navbar-nav me-auto flex-row gap-3">
				<a class="nav-link" href="/books">Books</a>
				<a class="nav-link" href="/readers">Readers</a>
				<a class="nav-link" href="/loans">Loans</a>
			</div>
			<a class="nav-link" href="/logout">Logout</a>
		</div>
	</nav>

	<main>
		<div class="page-header">
			<h2>Readers</h2>
			<button class="btn-primary" onclick="window.location='/readers/add'">Add Reader</button>
		</div>
		<table>
			<thead>
				<tr>
					<th style="width: 10%">Reader ID</th>
					<th style="width: 15%">Name</th>
					<th style="width: 15%">Email</th>
					<th style="width: 15%">Phone</th>
					<th style="width: 20%">Address</th>
					<th style="width: 10%">Location</th>
				</tr>
			</thead>
			<tbody>
				{% for reader in readers %}
				<tr>
					<tr onclick="window.location='/readers/{{ reader.reader_id }}'" style="cursor: pointer;">
					<td>{{ reader.reader_id }}</td>
					<td>{{ reader.name }}</td>
                    <td style="text-transform: none">{{ reader.email }}</td>
					<td>{{ reader.phone }}</td>
					<td>{{ reader.address }}</td>
					<td>{{ reader.location }}</td>
				</tr>
				{% endfor %}
			</tbody>
		</table>
	</main>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
