{% extends "base.html" %}
{% block content %}

<main>
	<div class="page-header">
		<h2>Readers</h2>
		<button class="btn-primary" onclick="window.location='/readers/add'">Add Reader</button>
	</div>
	<table>
		<thead>
			<tr>
				<th style="width: 10%">Reader ID</th>
				<th style="width: 15%">Name</th>
				<th style="width: 15%">Email</th>
				<th style="width: 15%">Phone</th>
				<th style="width: 20%">Address</th>
				<th style="width: 10%">Location</th>
			</tr>
		</thead>
		<tbody>
			{% for reader in readers %}
			<tr onclick="window.location='/readers/{{ reader.reader_id }}'" style="cursor: pointer;">
				<td>{{ reader.reader_id }}</td>
				<td>{{ reader.name }}</td>
				<td style="text-transform: none">{{ reader.email }}</td>
				<td>{{ reader.phone }}</td>
				<td>{{ reader.address }}</td>
				<td>{{ reader.location }}</td>
			</tr>
			{% endfor %}
		</tbody>
	</table>
</main>

{% endblock %}
