<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/mini-logo.png') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top" style="border-bottom: 1px solid #dce8f5;">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">Web Library</a>
            <div class="navbar-nav me-auto flex-row gap-3">
                <a class="nav-link" href="/books">Books</a>
                <a class="nav-link" href="/readers">Readers</a>
                <a class="nav-link" href="/loans">Loans</a>
            </div>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h2>Add Book</h2>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p class="form-error">{{ messages[0] }}</p>
            {% endif %}
        {% endwith %}
        <form action="/books/add" method="POST">
            <div class="form-fields">
                <input type="text" name="title" placeholder="Title" required>
                <input type="text" name="author" placeholder="Author" required>
                <input type="text" name="isbn" placeholder="ISBN">
                <input type="text" name="category" placeholder="Category">
                <input type="text" name="year" placeholder="Year">
                <input type="text" name="publisher" placeholder="Publisher">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Add Book</button>
                <a href="/books" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
