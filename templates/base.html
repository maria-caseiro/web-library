<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/mini-logo.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top" style="border-bottom: 1px solid #dce8f5;">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">Web Library</a>
            <div class="navbar-nav me-auto flex-row gap-3">
                <a class="nav-link" href="/books">Books</a>
                <a class="nav-link" href="/readers">Readers</a>
                <a class="nav-link" href="/loans">Loans</a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <form method="GET" action="/search" class="search">
                    <select name="type">
                        <option value="books">Books</option>
                        <option value="readers">Readers</option>
                    </select>
                    <input type="text" name="search" placeholder="Search...">
                    <button class="btn-secondary"><i class="bi bi-search"></i></button>
                </form>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
