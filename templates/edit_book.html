{% extends "base.html" %}
{% block content %}

<main>
    <div class="page-header">
        <h2>Edit Book</h2>
    </div>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <p class="form-error">{{ messages[0] }}</p>
    {% endif %}
    {% endwith %}
    <form action="/books/{{ book.book_id }}/edit" method="POST">
        <div class="form-fields">
            <input type="text" name="title" value="{{ book.title }}" required>
            <input type="text" name="author" value="{{ book.author }}">
            <input type="text" name="isbn" value="{{ book.isbn }}">
            <input type="text" name="category" value="{{ book.category }}">
            <input type="text" name="year" value="{{ book.year }}">
            <input type="text" name="publisher" value="{{ book.publisher }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save</button>
            <a href="/books/{{ book.book_id }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</main>

{% endblock %}
