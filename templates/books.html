<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Web Library</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<nav class="navbar navbar-expand-lg sticky-top" style="border-bottom: 1px solid #dce8f5;">
		<div class="container-fluid px-4">
			<a class="navbar-brand" href="/">Web Library</a>
			<div class="navbar-nav me-auto flex-row gap-3">
				<a class="nav-link" href="/books">Books</a>
				<a class="nav-link" href="/readers">Readers</a>
				<a class="nav-link" href="/loans">Loans</a>
			</div>
			<a class="nav-link" href="/logout">Logout</a>
		</div>
	</nav>

	<main>
		<div class="page-header">
			<h2>Books</h2>
			<button class="btn-primary" onclick="window.location='/books/add'">Add Book</button>
		</div>
		<table>
			<thead>
				<tr>
					<th style="width: 25%">Title</th>
					<th style="width: 15%">Author</th>
					<th style="width: 10%">ISBN</th>
					<th style="width: 10%">Category</th>
					<th style="width: 5%">Year</th>
					<th style="width: 10%">Publisher</th>
				</tr>
			</thead>
			<tbody>
				{% for book in books %}
				<tr>
					<tr onclick="window.location='/books/{{ book.book_id }}'" style="cursor: pointer;">
					<td>{{ book.title }}</td>
					<td>{{ book.author }}</td>
					<td>{{ book.isbn }}</td>
					<td>{{ book.category }}</td>
					<td>{{ book.year }}</td>
					<td>{{ book.publisher }}</td>
				</tr>
				{% endfor %}
			</tbody>
		</table>
	</main>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
